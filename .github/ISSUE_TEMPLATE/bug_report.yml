name: Bug report
description: Something in Rushlite doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! A minimal reproduction
        makes a fix much more likely.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened, and what did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: >
        The smallest Python (or C++) snippet that triggers the bug. If the bug
        involves specific values or shapes, include them.
      render: python
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Full traceback / compiler output, if any.
      render: shell
  - type: dropdown
    id: device
    attributes:
      label: Device
      description: Which backend does the bug occur on?
      options:
        - CPU
        - CUDA
        - Both
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Rushlite version
      description: Release version, or the commit hash if built from source.
      placeholder: "0.0.1 / abc1234"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, how you installed Rushlite (pip / from source), CUDA Toolkit version and GPU if relevant.
      placeholder: |
        OS: Ubuntu 24.04
        Python: 3.11
        Install: pip / source (CPU or CUDA build?)
        CUDA: 12.8, RTX 4090
    validations:
      required: true
